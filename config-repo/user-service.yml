server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/quickeats_user
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-on-validation-error: true


management:
  endpoints:
    web:
      exposure:
        include: "*"
