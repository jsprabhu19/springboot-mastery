server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/quickeats_payment
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-on-validation-error: true

# Razorpay credentials for simulation or active test environment
razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:rzp_test_mockKeyId}
    secret: ${RAZORPAY_KEY_SECRET:rzp_test_mockSecret}

management:
  endpoints:
    web:
      exposure:
        include: "*"
