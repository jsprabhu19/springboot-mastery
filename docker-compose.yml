version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quickeats-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quickeats_user
    volumes:
      - ./docker/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quickeats-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: quickeats-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: quickeats_restaurant
    volumes:
      - mongodb_data:/data/db
    networks:
      - quickeats-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: quickeats-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - quickeats-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: quickeats-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - quickeats-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 5s
      timeout: 10s
      retries: 5

  zipkin:
    image: openzipkin/zipkin
    container_name: quickeats-zipkin
    ports:
      - "9411:9411"
    networks:
      - quickeats-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9411/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: quickeats-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - quickeats-network

  grafana:
    image: grafana/grafana:latest
    container_name: quickeats-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - quickeats-network

  # 1. Discovery Server
  discovery-server:
    build: ./discovery-server
    container_name: quickeats-discovery-server
    ports:
      - "8761:8761"
    networks:
      - quickeats-network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  # 2. Config Server
  config-server:
    build: ./config-server
    container_name: quickeats-config-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/app/config-repo
    networks:
      - quickeats-network
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8888/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  # 3. API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: quickeats-api-gateway
    ports:
      - "8080:8080"
    networks:
      - quickeats-network
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
      SPRING_DATA_REDIS_HOST: redis
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: "http://zipkin:9411/api/v2/spans"
    depends_on:
      config-server:
        condition: service_healthy

  # 4. User Service
  user-service:
    build: ./user-service
    container_name: quickeats-user-service
    ports:
      - "8081:8081"
    networks:
      - quickeats-network
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/quickeats_user"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: "http://zipkin:9411/api/v2/spans"
    depends_on:
      config-server:
        condition: service_healthy

  # 5. Restaurant Service
  restaurant-service:
    build: ./restaurant-service
    container_name: quickeats-restaurant-service
    ports:
      - "8082:8082"
    networks:
      - quickeats-network
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
      SPRING_DATA_MONGODB_URI: "mongodb://mongodb:27017/quickeats_restaurant"
      SPRING_DATA_REDIS_HOST: redis
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: "http://zipkin:9411/api/v2/spans"
    depends_on:
      config-server:
        condition: service_healthy

  # 6. Order Service
  order-service:
    build: ./order-service
    container_name: quickeats-order-service
    ports:
      - "8083:8083"
    networks:
      - quickeats-network
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/quickeats_order"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: "http://zipkin:9411/api/v2/spans"
    depends_on:
      config-server:
        condition: service_healthy

  # 7. Payment Service
  payment-service:
    build: ./payment-service
    container_name: quickeats-payment-service
    ports:
      - "8084:8084"
    networks:
      - quickeats-network
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/quickeats_payment"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: "http://zipkin:9411/api/v2/spans"
    depends_on:
      config-server:
        condition: service_healthy

  # 8. Notification Service
  notification-service:
    build: ./notification-service
    container_name: quickeats-notification-service
    ports:
      - "8085:8085"
    networks:
      - quickeats-network
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: "http://zipkin:9411/api/v2/spans"
    depends_on:
      config-server:
        condition: service_healthy

  # 9. Delivery Service
  delivery-service:
    build: ./delivery-service
    container_name: quickeats-delivery-service
    ports:
      - "8086:8086"
    networks:
      - quickeats-network
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-server:8761/eureka/"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/quickeats_delivery"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      SPRING_DATA_REDIS_HOST: redis
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: "http://zipkin:9411/api/v2/spans"
    depends_on:
      config-server:
        condition: service_healthy

volumes:
  postgres_data:
  mongodb_data:
  redis_data:

networks:
  quickeats-network:
    driver: bridge
